name: rok_us_alliance_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  share_plus: ^10.0.2
  firebase_core: ^3.13.1
  cloud_firestore: ^5.6.7
  firebase_auth: ^5.5.3
  cloud_functions: ^5.5.0
  firebase_messaging: ^15.1.4
  firebase_storage: ^12.3.4
  image_picker: ^1.1.2
  youtube_player_iframe: ^5.2.1
  flutter_naver_login: ^2.1.1
  kakao_flutter_sdk_user: ^1.9.6
  sign_in_with_apple: ^6.1.4
  google_sign_in: ^6.2.2
  qr_flutter: ^4.1.0
  flutter_svg: ^2.0.10+1
  mobile_scanner: ^5.2.3
  crypto: ^3.0.3
  flutter_markdown: ^0.7.4
  screen_brightness: ^2.1.0
  screenshot: ^3.0.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#0D1117"
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/maga_with_rok_popup.png
    - assets/images/korea_flag.png
    - assets/images/usa_flag.png
    - assets/legal/
    - assets/svg/

  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf
    # Pretendard / JetBrainsMono 는 향후 코드 사용 시 추가 등록.
    # 라이선스: assets/fonts/README.md 참조 (SIL OFL 1.1)