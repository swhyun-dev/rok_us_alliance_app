      <circle cx="160" cy="130" r="62" fill="#CD2E3A"/>
      <path d="M 98,130 A 62,62 0 0,0 222,130 Z" fill="#003478"/>
      <circle cx="129" cy="130" r="31" fill="#CD2E3A"/>
      <circle cx="191" cy="130" r="31" fill="#003478"/>

