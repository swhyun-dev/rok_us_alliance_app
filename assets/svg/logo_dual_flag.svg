<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>ROK_US Alliance - Dual Flag Logo (Corrected)</title>

  <defs>
