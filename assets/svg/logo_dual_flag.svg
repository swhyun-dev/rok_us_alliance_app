      <rect x="36" y="-55" width="14" height="110" fill="#E63946"/>
      <rect x="36" y="-55" width="14" height="14" fill="#FFFFFF"/>
      <rect x="-50" y="-7" width="100" height="14" fill="#E63946"/>
