<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260">
  <title>Korean Flag (Taegukgi) - Waving</title>

  <defs>
    <linearGradient id="krShadeWv2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </linearGradient>
    <clipPath id="krWaveClipFlag2">
      <path d="M 0,2 Q 80,18 160,4 Q 240,-12 320,0 L 320,260 Q 240,246 160,262 Q 80,278 0,260 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#krWaveClipFlag2)">
    <!-- White flag background -->
    <rect x="0" y="0" width="320" height="260" fill="#FFFFFF"/>

    <!-- ═══ TAEGUK (정확) ═══ -->
    <!-- Center: (160, 130), R=62, r=31 -->
    <!-- Layer 1: Full red circle -->
    <circle cx="160" cy="130" r="62" fill="#CD2E3A"/>
    <!-- Layer 2: Bottom half blue -->
    <path d="M 98,130 A 62,62 0 0,0 222,130 Z" fill="#003478"/>
    <!-- Layer 3: Left small circle red (on the blue side) -->
    <circle cx="129" cy="130" r="31" fill="#CD2E3A"/>
    <!-- Layer 4: Right small circle blue (on the red side) -->
    <circle cx="191" cy="130" r="31" fill="#003478"/>

    <!-- ═══ FOUR TRIGRAMS ═══ -->
    <g fill="#000000">
      <!-- ☰ 건 (heaven) - Top-left, 3 solid bars -->
      <g transform="translate(50, 45) rotate(-33.69)">
        <rect x="-22" y="-3" width="44" height="6"/>
        <rect x="-22" y="6" width="44" height="6"/>
        <rect x="-22" y="15" width="44" height="6"/>
      </g>

      <!-- ☲ 리 (fire) - Top-right, solid/broken/solid -->
      <g transform="translate(270, 45) rotate(33.69)">
        <rect x="-22" y="-3" width="44" height="6"/>
        <rect x="-22" y="6" width="18" height="6"/>
        <rect x="4" y="6" width="18" height="6"/>
        <rect x="-22" y="15" width="44" height="6"/>
      </g>

      <!-- ☵ 감 (water) - Bottom-left, broken/solid/broken -->
      <g transform="translate(50, 215) rotate(33.69)">
        <rect x="-22" y="-3" width="18" height="6"/>
        <rect x="4" y="-3" width="18" height="6"/>
        <rect x="-22" y="6" width="44" height="6"/>
        <rect x="-22" y="15" width="18" height="6"/>
        <rect x="4" y="15" width="18" height="6"/>
      </g>

      <!-- ☷ 곤 (earth) - Bottom-right, 3 broken bars -->
      <g transform="translate(270, 215) rotate(-33.69)">
        <rect x="-22" y="-3" width="18" height="6"/>
        <rect x="4" y="-3" width="18" height="6"/>
        <rect x="-22" y="6" width="18" height="6"/>
        <rect x="4" y="6" width="18" height="6"/>
        <rect x="-22" y="15" width="18" height="6"/>
        <rect x="4" y="15" width="18" height="6"/>
      </g>
    </g>

    <!-- Cloth shading -->
    <rect x="0" y="0" width="320" height="260" fill="url(#krShadeWv2)"/>

    <!-- Fold shadows -->
    <g fill="#000000" opacity="0.18">
      <path d="M 0,60 Q 80,68 160,55 Q 240,42 320,55 L 320,62 Q 240,49 160,62 Q 80,75 0,67 Z"/>
      <path d="M 0,140 Q 80,148 160,135 Q 240,122 320,135 L 320,142 Q 240,129 160,142 Q 80,155 0,147 Z"/>
      <path d="M 0,210 Q 80,218 160,205 Q 240,192 320,205 L 320,212 Q 240,199 160,212 Q 80,225 0,217 Z"/>
    </g>
  </g>
</svg>
