<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <title>Korean Flag - Pure Static Reference</title>

  <!-- White background (3:2 ratio = 600x400) -->
  <rect x="0" y="0" width="600" height="400" fill="#FFFFFF"/>

  <!-- ═══ TAEGUK ═══ -->
  <!-- Center: (300, 200), large radius = 80 (1/4 of flag height per spec: actually 1/3 of height = ~133, but for visibility we use 100) -->
  <!-- Per official spec: taeguk diameter = flag width / 4 (for 3:2 flag with standard 24-unit grid) -->
  <!-- Using radius 100 here for clarity -->

  <!-- Standard taeguk construction:
       Center: (300, 200), Outer radius: 100, Inner radius: 50
       Red occupies top half + the left-side small circle
       Blue occupies bottom half + the right-side small circle... 
       Actually correct: Red top + lower-right small lobe; Blue bottom + upper-left small lobe -->

  <!-- Whole large circle: Red base layer -->
  <circle cx="300" cy="200" r="100" fill="#CD2E3A"/>

  <!-- Blue half: bottom semicircle -->
  <path d="M 200,200 A 100,100 0 0,0 400,200 Z" fill="#003478"/>

  <!-- Small circle on the LEFT half (in blue territory) - filled with RED to create the swirl -->
  <circle cx="250" cy="200" r="50" fill="#CD2E3A"/>

  <!-- Small circle on the RIGHT half (in red territory) - filled with BLUE to create the swirl -->
  <circle cx="350" cy="200" r="50" fill="#003478"/>

  <!-- ═══ FOUR TRIGRAMS ═══ -->
  <!-- Trigrams placed on 4 corners of the flag, each rotated to align with the diagonal axis pointing through the taeguk center -->
  <!-- The trigram bars are perpendicular to the axis from corner to center -->

  <!-- Standard distance from flag corners: positioned along diagonals -->
  <!-- Bar dimensions: each "long bar" = 50% of taeguk radius length, ~50 wide x ~8 tall, 3 bars stacked -->

  <g fill="#000000">
    <!-- ☰ 건 (Geon, Heaven) - Top-Left corner, 3 solid bars -->
    <!-- Trigrams point toward the taeguk center, so bars are perpendicular to the corner-to-center line -->
    <!-- Position around 1/8 from top-left corner along the diagonal -->
    <g transform="translate(110, 80) rotate(-33.69)">
      <rect x="-30" y="-4" width="60" height="8"/>
      <rect x="-30" y="8" width="60" height="8"/>
      <rect x="-30" y="20" width="60" height="8"/>
    </g>

    <!-- ☲ 리 (Ri, Fire) - Top-Right corner, solid-broken-solid -->
    <g transform="translate(490, 80) rotate(33.69)">
      <rect x="-30" y="-4" width="60" height="8"/>
      <rect x="-30" y="8" width="25" height="8"/>
      <rect x="5" y="8" width="25" height="8"/>
      <rect x="-30" y="20" width="60" height="8"/>
    </g>

    <!-- ☵ 감 (Gam, Water) - Bottom-Left corner, broken-solid-broken -->
    <g transform="translate(110, 320) rotate(33.69)">
      <rect x="-30" y="-4" width="25" height="8"/>
      <rect x="5" y="-4" width="25" height="8"/>
      <rect x="-30" y="8" width="60" height="8"/>
      <rect x="-30" y="20" width="25" height="8"/>
      <rect x="5" y="20" width="25" height="8"/>
    </g>

    <!-- ☷ 곤 (Gon, Earth) - Bottom-Right corner, 3 broken bars -->
    <g transform="translate(490, 320) rotate(-33.69)">
      <rect x="-30" y="-4" width="25" height="8"/>
      <rect x="5" y="-4" width="25" height="8"/>
      <rect x="-30" y="8" width="25" height="8"/>
      <rect x="5" y="8" width="25" height="8"/>
      <rect x="-30" y="20" width="25" height="8"/>
      <rect x="5" y="20" width="25" height="8"/>
    </g>
  </g>
</svg>
